on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup_flathub

      - name: Clone flatpak-builder-tools
        run: git clone https://github.com/nickvidal/flatpak-builder-tools.git /tmp/flatpak-builder-tools

      - name: Install flatpak-builder-tools dependencies
        run: pip install aiohttp toml

      - name: Generate vendored pnpm sources
        run: |
          python3 /tmp/flatpak-builder-tools/node/flatpak-node-generator.py pnpm \
            -o apps/desktop/flatpak/pnpm-sources.json \
            pnpm-lock.yaml

      - name: Generate vendored cargo sources
        run: |
          python3 /tmp/flatpak-builder-tools/cargo/flatpak-cargo-generator.py \
            -d Cargo.lock \
            -o apps/desktop/flatpak/cargo-sources.json

      - name: Build Flatpak
        run: flatpak-builder --user --force-clean build-dir apps/desktop/flatpak/com.hyprnote.Hyprnote.yml
