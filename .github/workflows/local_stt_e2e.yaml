on:
  workflow_dispatch:
    inputs:
      sha:
        description: Commit SHA to test
        required: false
        type: string
      cactus_version:
        description: Cactus version to test
        required: false
        default: "1.11"
        type: string
  push:
    branches: [main]
    paths:
      - crates/transcribe-cactus/**
      - crates/cactus/**
      - crates/cactus-sys/**
  pull_request:
    paths:
      - crates/transcribe-cactus/**
      - crates/cactus/**
      - crates/cactus-sys/**

jobs:
  local-stt-e2e:
    runs-on: depot-ubuntu-24.04-arm-8
    strategy:
      matrix:
        model:
          - name: whisper-small
            repo: openai/whisper-small
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: |
          if [[ -n "${INPUT_SHA:-}" ]]; then
            git checkout "$INPUT_SHA"
          fi
        env:
          INPUT_SHA: ${{ inputs.sha }}
      - run: git clone --depth 1 --branch "v${CACTUS_VERSION}" https://github.com/cactus-compute/cactus.git cactus
        env:
          CACTUS_VERSION: ${{ inputs.cactus_version || '1.11' }}
      - uses: ./.github/actions/rust_install
        with:
          platform: linux
      - run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libcurl4-openssl-dev libclang-dev libpipewire-0.3-dev libpulse-dev
      - run: |
          pip3 install --break-system-packages huggingface-hub
          pip3 install --break-system-packages -e cactus/python/ --no-deps
      - uses: actions/cache@v4
        with:
          path: cactus/weights/
          key: cactus-models-${{ matrix.model.name }}-arm-v${{ inputs.cactus_version || '1.11' }}
      - run: cactus download ${{ matrix.model.repo }}
      - run: cargo test -p transcribe-cactus -- --ignored --nocapture --skip snapshot
        env:
          CACTUS_STT_MODEL: ${{ github.workspace }}/cactus/weights/${{ matrix.model.name }}
          CACTUS_CLOUD_API_KEY: ${{ secrets.CACTUS_CLOUD_API_KEY }}
          E2E_AUDIO_SECS: 20
